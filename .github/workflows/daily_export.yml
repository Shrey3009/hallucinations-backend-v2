name: Daily CSV Export

on:
  schedule:
    # 00:00 UTC corresponds to 8:00 PM EDT (or 7:00 PM EST depending on daylight savings)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI for testing

jobs:
  export_and_email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Export Script
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/export_today.py
